name: qstory
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  mobx: ^2.3.0
  flutter_mobx: ^2.1.0
  
  # Dependency Injection
  get_it: ^9.2.1
  
  # Networking
  dio: ^5.4.0
  
  # Localization
  intl: ^0.20.2
  
  # QR Operations
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  
  # Permissions
  permission_handler: ^12.0.1

  # Navigation
  go_router: ^17.1.0
  local_auth: ^3.0.0
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  cached_network_image: ^3.4.1
  google_fonts: ^8.0.1
  flutter_local_notifications: ^21.0.0
  flutter_timezone: ^5.0.1
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  mobx_codegen: ^2.3.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  generate: true
